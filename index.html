<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyMakeover · The perfect look for every moment</title>
    <meta
      name="description"
      content="EasyMakeover curates makeup, jewellery, outfit, and hairstyle suggestions based on your occasion, weather, and vibe."
    />

    <!-- Tailwind (Play CDN) for instant styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui"],
              serif: ["'Playfair Display'", "ui-serif", "Georgia"],
            },
          },
        },
      };
    </script>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E💄%3C/text%3E%3C/svg%3E" />
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>

    <!-- React + Babel via CDN: no build step needed -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App scripts -->
    <script src="data.js"></script>
    <script type="text/babel" data-presets="react" src="app.js"></script>
  </body>
</html>
